<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Tamar &amp; Renata · 31 May 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Italiana&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:        #FCF8F2;
    --paper:    rgba(255, 252, 246, .55);
    --paper-s:  rgba(255, 252, 246, .82);
    --ink:      #3A2A22;
    --ink-soft: #6B5448;
    --ink-mute: #9A8578;
    --blush:    #F2D7CE;
    --peach:    #EFB8A0;
    --rose:     #E6A39B;
    --gold:     #C8A26B;
    --line:     rgba(58,42,34,.10);

    --display: "Instrument Serif", "Cormorant Garamond", "Playfair Display", Georgia, serif;
    --body:    "Outfit", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono:    "JetBrains Mono", ui-monospace, monospace;

    --ease:    cubic-bezier(.22,.61,.36,1);
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;color:var(--ink);font-family:var(--body);font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  html{scroll-behavior:smooth;scroll-padding-top:80px}
  body{
    overflow-x:hidden;
    background-color:var(--bg);
    background-image:
      radial-gradient(60vw 55vh at 88% -10%, rgba(239,184,160,.28), transparent 60%),
      radial-gradient(55vw 45vh at -12% 28%,  rgba(230,163,155,.22), transparent 60%),
      radial-gradient(50vw 50vh at 30% 110%,  rgba(200,162,107,.18), transparent 60%),
      radial-gradient(60vw 50vh at 100% 70%,  rgba(242,215,206,.30), transparent 60%);
    background-attachment:fixed;
  }
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  button{font:inherit}
  ::selection{background:var(--peach);color:var(--ink)}

  /* type primitives */
  .display{font-family:var(--display);font-weight:400;letter-spacing:-0.01em;line-height:1.02}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}

  /* layout */
  .wrap{max-width:1180px;margin:0 auto;padding:0 28px}
  @media (max-width:640px){.wrap{padding:0 20px}}

  /* ─────────── side rail (desktop) ─────────── */
  .siderail{position:fixed;top:50%;left:24px;transform:translateY(-50%);z-index:55;display:none;flex-direction:column;gap:6px;pointer-events:auto}
  @media (min-width:1024px){.siderail{display:flex}}
  .siderail a{display:flex;align-items:center;gap:14px;padding:10px 14px 10px 12px;border-radius:999px;background:rgba(255,252,246,.6);border:1px solid var(--line);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);color:var(--ink-soft);font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;transition:transform .3s var(--ease), background .3s var(--ease), color .3s var(--ease), border-color .3s var(--ease), padding-right .3s var(--ease);box-shadow:0 10px 28px -18px rgba(58,42,34,.18)}
  .siderail a .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-mute);transition:background .3s var(--ease), transform .3s var(--ease)}
  .siderail a .lbl{opacity:.85;transition:opacity .25s var(--ease)}
  .siderail a:hover{color:var(--ink);background:#FFFCF6;transform:translateX(4px);border-color:rgba(230,163,155,.45)}
  .siderail a:hover .dot{background:var(--rose);transform:scale(1.2)}
  .siderail a.active{background:linear-gradient(90deg, rgba(242,215,206,.7), rgba(255,252,246,.85));color:var(--ink);border-color:rgba(230,163,155,.5);padding-right:18px}
  .siderail a.active .dot{background:var(--rose);transform:scale(1.4)}
  /* hide hamburger when rail visible */
  @media (min-width:1024px){.menu-btn{display:none}}

  /* ─────────── top floating chrome ─────────── */
  .topbar{position:fixed;inset:0 0 auto 0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;pointer-events:none;transition:background .3s var(--ease), backdrop-filter .3s var(--ease), border-color .3s var(--ease);border-bottom:1px solid transparent}
  .topbar.scrolled{background:rgba(252,248,242,.7);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom-color:var(--line)}
  .topbar > *{pointer-events:auto}
  .brand{font-family:var(--display);font-style:italic;font-size:24px;letter-spacing:.01em;color:var(--ink);transition:opacity .3s var(--ease)}
  .brand .amp{color:var(--rose);font-weight:500;margin:0 3px}
  .topbar .stamp{display:none;font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute);background:rgba(255,252,246,.75);padding:8px 14px;border-radius:999px;border:1px solid var(--line)}
  @media (min-width:900px){.topbar .stamp{display:inline-block}}

  .menu-btn{appearance:none;border:1px solid var(--line);background:rgba(255,252,246,.78);padding:10px 16px 10px 14px;border-radius:999px;display:inline-flex;align-items:center;gap:10px;color:var(--ink);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;transition:transform .25s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease)}
  .menu-btn:hover{background:#fff;box-shadow:0 8px 24px -10px rgba(58,42,34,.18)}
  .menu-btn .bars{display:flex;flex-direction:column;gap:3px}
  .menu-btn .bars i{display:block;width:14px;height:1.5px;background:var(--ink)}

  /* ─────────── drawer ─────────── */
  .scrim{position:fixed;inset:0;background:rgba(58,42,34,.32);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .35s var(--ease);z-index:70}
  .scrim.open{opacity:1;pointer-events:auto}

  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(380px, 88vw);background:#FFFCF6;border-left:1px solid var(--line);z-index:80;transform:translateX(105%);transition:transform .42s var(--ease);display:flex;flex-direction:column;box-shadow:-30px 0 60px -20px rgba(58,42,34,.18)}
  .drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;justify-content:space-between;align-items:center;padding:24px 28px;border-bottom:1px solid var(--line)}
  .drawer-head .lab{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute)}
  .drawer-close{appearance:none;background:transparent;border:0;color:var(--ink);font-size:28px;line-height:1;cursor:pointer;padding:4px 8px;border-radius:8px}
  .drawer-close:hover{background:rgba(58,42,34,.05)}
  .drawer-nav{padding:14px 12px 8px;display:flex;flex-direction:column;gap:2px;flex:1;overflow:auto}
  .drawer-nav a{display:flex;align-items:baseline;gap:14px;padding:16px 18px;border-radius:14px;color:var(--ink);transition:background .2s var(--ease), color .2s var(--ease), transform .25s var(--ease);font-family:var(--display);font-size:30px;font-weight:400;line-height:1.05;letter-spacing:-0.005em}
  .drawer-nav a:hover{background:rgba(242,215,206,.5);transform:translateX(4px)}
  .drawer-nav a.active{background:linear-gradient(90deg, rgba(242,215,206,.65), rgba(255,252,246,0));color:var(--ink)}
  .drawer-nav a .num{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--ink-mute);min-width:30px;font-weight:500}
  .drawer-nav a em{font-style:italic;color:var(--rose);font-weight:400}
  .drawer-foot{padding:20px 28px 28px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
  .drawer-foot .big{font-family:var(--display);font-style:italic;font-size:22px;color:var(--ink)}
  .drawer-foot .small{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute)}

  /* ─────────── hero ─────────── */
  .hero{position:relative;min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:130px 0 80px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1fr;gap:42px;align-items:center}
  @media (min-width:980px){.hero-grid{grid-template-columns:1.2fr .8fr;gap:60px}}
  .hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:28px;opacity:0;transform:translateY(8px);animation:rise .9s var(--ease) .1s forwards}
  .hero-meta .pip{width:8px;height:8px;border-radius:50%;background:var(--rose)}
  .hero-title{font-size:clamp(60px, 13vw, 168px);font-weight:300;opacity:0;transform:translateY(20px);animation:rise 1s var(--ease) .25s forwards}
  .hero-title .and{display:inline-block;font-style:italic;color:var(--rose);font-weight:400;margin:0 .06em;transform:translateY(.03em)}
  .hero-sub{margin-top:24px;display:flex;flex-direction:column;gap:8px;opacity:0;transform:translateY(12px);animation:rise 1s var(--ease) .45s forwards}
  .hero-sub .row{display:flex;flex-wrap:wrap;gap:6px 18px;align-items:baseline}
  .hero-sub .row .k{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);min-width:78px}
  .hero-sub .row .v{font-size:17px;color:var(--ink)}

  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes float-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* date card */
  .datecard{background:var(--paper);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid var(--line);border-radius:22px;padding:28px 30px 26px;position:relative;overflow:hidden;opacity:0;transform:translateY(20px);animation:rise 1s var(--ease) .6s forwards;box-shadow:0 20px 60px -30px rgba(58,42,34,.18)}
  .datecard::before{content:"";position:absolute;inset:auto -60px -60px auto;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--peach), var(--blush) 55%, transparent 75%);opacity:.55;filter:blur(8px);pointer-events:none}
  .datecard .month{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft)}
  .datecard .day{font-family:var(--display);font-size:clamp(110px, 16vw, 160px);font-weight:400;line-height:1;letter-spacing:-0.02em;margin:6px 0 2px;color:var(--ink);font-variant-numeric:lining-nums}
  .datecard .year{font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-mute)}
  .datecard hr{border:0;border-top:1px solid var(--line);margin:18px 0}
  .datecard .cd{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center}
  .datecard .cd .n{font-family:var(--display);font-size:30px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .datecard .cd .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);margin-top:6px}
  .datecard .footnote{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
  .datecard .footnote .pip{width:6px;height:6px;border-radius:50%;background:var(--rose);display:inline-block;margin-right:8px;vertical-align:middle}

  /* hero confetti */
  .confetti{position:absolute;inset:0;pointer-events:none;z-index:0}
  .confetti span{position:absolute;border-radius:50%;opacity:.55;will-change:transform}
  .hero > .wrap{position:relative;z-index:1}

  /* ─────────── sections ─────────── */
  section.s{padding:100px 0;position:relative}
  @media (max-width:640px){section.s{padding:70px 0}}
  .s-head{display:flex;flex-direction:column;gap:16px;margin-bottom:52px;max-width:780px}
  .s-num{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-mute)}
  .s-title{font-size:clamp(40px,6.4vw,72px)}
  .s-title em{font-style:italic;color:var(--rose);font-weight:400}
  .s-sub{font-size:19px;color:var(--ink-soft);line-height:1.55;max-width:62ch;text-wrap:pretty}

  /* reveal-on-scroll */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .9s var(--ease), transform .9s var(--ease)}
  .reveal.in{opacity:1;transform:translateY(0)}
  .reveal.d1{transition-delay:.06s}
  .reveal.d2{transition-delay:.12s}
  .reveal.d3{transition-delay:.18s}
  .reveal.d4{transition-delay:.24s}

  /* event card */
  .event{display:grid;grid-template-columns:1fr;gap:0;border:1px solid var(--line);border-radius:26px;overflow:hidden;background:var(--paper);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);box-shadow:0 24px 60px -32px rgba(58,42,34,.16)}
  @media (min-width:900px){.event{grid-template-columns:1.05fr 1fr}}
  .event .copy{padding:44px 40px}
  .event .facts{padding:40px;background:rgba(246,237,226,.55);border-top:1px solid var(--line);position:relative}
  @media (min-width:900px){.event .facts{border-top:0;border-left:1px solid var(--line)}}
  @media (max-width:640px){.event .copy,.event .facts{padding:32px 26px}}

  .event h3{font-family:var(--display);font-size:clamp(36px,4.6vw,56px);font-weight:400;margin:0 0 14px;line-height:1.05;letter-spacing:-0.005em}
  .event h3 .where{display:block;font-style:italic;color:var(--rose);font-size:.6em;margin-top:6px}
  .event p{font-size:17px;line-height:1.7;color:var(--ink-soft);margin:0 0 14px;text-wrap:pretty}
  .event p strong{color:var(--ink);font-weight:500}

  /* facts list */
  .meta{display:flex;flex-direction:column;gap:0}
  .meta .row{display:grid;grid-template-columns:96px 1fr;gap:18px;align-items:baseline;padding:14px 0;border-top:1px dashed var(--line)}
  .meta .row:first-child{border-top:0;padding-top:0}
  .meta .row:last-child{padding-bottom:0}
  .meta .k{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);padding-top:4px}
  .meta .v{font-size:19px;line-height:1.4;color:var(--ink);font-weight:400;text-wrap:pretty}
  .meta .v.big{font-family:var(--display);font-size:30px;font-weight:400;letter-spacing:-0.005em;line-height:1.05;color:var(--ink)}
  .meta .v a{border-bottom:1px solid var(--line);transition:border-color .2s var(--ease), color .2s var(--ease)}
  .meta .v a:hover{border-bottom-color:var(--rose);color:var(--ink)}
  @media (max-width:520px){
    .meta .row{grid-template-columns:1fr;gap:4px}
    .meta .v{font-size:18px}
    .meta .v.big{font-size:26px}
  }

  .stamp{position:absolute;top:24px;right:24px;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute);display:flex;align-items:center;gap:8px}
  .stamp .dot{width:6px;height:6px;border-radius:50%;background:var(--rose)}

  /* ceremony emphasis */
  .ceremony-callout{margin:24px 0 6px;padding:22px 24px;border-radius:18px;background:linear-gradient(135deg, var(--peach), var(--blush));color:var(--ink);display:flex;align-items:center;gap:20px;box-shadow:0 14px 40px -22px rgba(239,184,160,.6)}
  .ceremony-callout .big{font-family:var(--display);font-size:48px;line-height:1;font-weight:500;letter-spacing:-0.01em}
  .ceremony-callout .small{font-size:15px;line-height:1.5}
  .ceremony-callout .small b{font-weight:600;color:var(--ink)}

  /* transport callout */
  .bus-callout{margin:24px 0 6px;padding:18px 20px;border-radius:18px;background:linear-gradient(135deg, rgba(255,252,246,.85), rgba(242,215,206,.45));border:1px solid var(--line);display:flex;align-items:center;gap:18px;color:var(--ink);overflow:hidden;position:relative}
  .bus-callout .bus-svg{flex:0 0 auto;animation:bus-roll 9s ease-in-out infinite;filter:drop-shadow(0 6px 10px rgba(58,42,34,.18))}
  .bus-callout .bus-title{font-family:var(--display);font-size:24px;line-height:1.1;font-weight:500;letter-spacing:-0.005em;margin-bottom:4px}
  .bus-callout .bus-sub{font-size:14.5px;line-height:1.5;color:var(--ink-soft)}
  @keyframes bus-roll{0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)}}
  @media (max-width:520px){
    .bus-callout{flex-direction:column;align-items:flex-start;gap:12px}
    .bus-callout .bus-svg{transform:scale(.85);transform-origin:left center}
    .bus-callout .bus-title{font-size:22px}
  }

  /* image drop slot */
  .chamber-slot{margin:22px 0 8px}
  .chamber-slot image-slot{display:block;width:100%;aspect-ratio:16/10;border-radius:16px;overflow:hidden;box-shadow:0 18px 40px -20px rgba(58,42,34,.28)}
  .chamber-cap{margin-top:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mute);text-align:center}

  /* ─────────── favourites ─────────── */
  .favs{display:grid;grid-template-columns:1fr;gap:14px}
  @media (min-width:720px){.favs{grid-template-columns:repeat(2,1fr)}}
  .fav{position:relative;background:var(--paper);backdrop-filter:blur(12px) saturate(140%);-webkit-backdrop-filter:blur(12px) saturate(140%);border:1px solid var(--line);border-radius:20px;padding:26px 26px 24px;display:flex;flex-direction:column;gap:10px;transition:transform .4s var(--ease), box-shadow .4s var(--ease), border-color .4s var(--ease), background .4s var(--ease);opacity:0;transform:translateY(28px);overflow:hidden}
  .fav.in{opacity:1;transform:translateY(0)}
  .fav:hover{transform:translateY(-4px);box-shadow:0 24px 50px -22px rgba(58,42,34,.22);border-color:rgba(230,163,155,.5);background:rgba(255,252,246,.78)}
  .fav::after{content:"";position:absolute;inset:auto -30px -30px auto;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--peach), transparent 70%);opacity:0;transition:opacity .4s var(--ease);pointer-events:none}
  .fav:hover::after{opacity:.55}
  .fav-h{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .fav-name{font-family:var(--display);font-size:32px;font-weight:500;letter-spacing:-0.005em;line-height:1.05;transition:transform .4s var(--ease)}
  .fav:hover .fav-name{transform:translateX(2px)}
  .fav-num{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--ink-mute);background:rgba(58,42,34,.04);padding:4px 8px;border-radius:6px}
  .fav-emoji{position:absolute;top:18px;right:54px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:26px;line-height:1;background:rgba(255,252,246,.85);border:1px solid var(--line);border-radius:50%;box-shadow:0 8px 18px -8px rgba(58,42,34,.25);transition:transform .5s var(--ease);will-change:transform;pointer-events:none}
  .fav:hover .fav-emoji{animation:wiggle .9s ease-in-out 1}
  @keyframes wiggle{
    0%   { transform: rotate(0deg) scale(1) }
    20%  { transform: rotate(-12deg) scale(1.12) }
    40%  { transform: rotate(10deg) scale(1.12) }
    60%  { transform: rotate(-8deg) scale(1.1) }
    80%  { transform: rotate(6deg) scale(1.06) }
    100% { transform: rotate(0deg) scale(1) }
  }
  .fav .fav-h{padding-right:60px}
  @media (max-width:520px){
    .fav-emoji{width:40px;height:40px;font-size:22px;right:48px;top:16px}
  }
  .fav-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--rose)}
  .fav-desc{font-size:15.5px;line-height:1.6;color:var(--ink-soft);margin:0}
  .fav-picks{display:flex;flex-direction:column;gap:8px;margin-top:8px;padding-top:14px;border-top:1px solid var(--line)}
  .fav-pick{display:flex;gap:12px;align-items:baseline;font-size:14.5px;color:var(--ink)}
  .fav-pick .who{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);min-width:74px}
  .fav-map{margin-top:8px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);display:inline-flex;align-items:center;gap:8px;align-self:flex-start;border-bottom:1px solid var(--line);padding-bottom:3px;transition:border-color .2s var(--ease), color .2s var(--ease), gap .25s var(--ease)}
  .fav-map:hover{color:var(--rose);border-bottom-color:var(--rose);gap:12px}
  .fav-map svg{transition:transform .25s var(--ease)}
  .fav:hover .fav-map svg{transform:translate(2px,-2px)}

  /* ─────────── welcome / photos ─────────── */
  .us-grid{display:grid;grid-template-columns:1fr;gap:22px;align-items:center}
  @media (min-width:880px){.us-grid{grid-template-columns:.95fr 1.05fr;gap:60px}}

        if(this._img.getAttribute('src')!==url){this._img.src=url;this._ghost.src=url;}
        this._img.style.display='block';this._empty.style.display='none';this.setAttribute('data-filled','');this._clampView();this._applyView();
      }else{
        this._img.style.display='none';this._img.removeAttribute('src');this._ghost.removeAttribute('src');this._empty.style.display='flex';this.removeAttribute('data-filled');
      }
    }
  }
  if(!customElements.get('image-slot'))customElements.define('image-slot',ImageSlot);
})();

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, c => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

}

function useCountdown(targetISO) {
  const target = useMemo(() => new Date(targetISO).getTime(), [targetISO]);
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000);
  const h = Math.floor(diff / 3600000) % 24;
  const m = Math.floor(diff / 60000) % 60;
  const s = Math.floor(diff / 1000) % 60;
  return { d, h, m, s };
}

function Confetti({ enabled }) {
  const dots = useMemo(() => {
    const colors = ['var(--blush)','var(--peach)','var(--rose)','var(--gold)','#FFFFFF'];
    const arr = [];
    let seed = 7;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    for (let i = 0; i < 32; i++) {
      arr.push({
        left: rnd() * 100, top: rnd() * 100,
        size: 6 + rnd() * 16,
        color: colors[Math.floor(rnd() * colors.length)],
        delay: rnd() * 8, dur: 9 + rnd() * 9,
        x: (rnd() - 0.5) * 30, y: (rnd() - 0.5) * 30,
        opacity: 0.30 + rnd() * 0.35,
      });
    }
    return arr;
  }, []);
  if (!enabled) return null;
  return (
    <div className="confetti" aria-hidden="true">
      <style>{`@keyframes drift-a { 0%,100%{transform:translate(0,0)} 50%{transform:translate(var(--x),var(--y))} }`}</style>
      {dots.map((d, i) => (
        <span key={i} style={{
          left: d.left + '%', top: d.top + '%', width: d.size, height: d.size,
          background: d.color, opacity: d.opacity,
          ['--x']: d.x + 'px', ['--y']: d.y + 'px',
          animation: `drift-a ${d.dur}s ease-in-out ${d.delay}s infinite`
        }} />
      ))}
    </div>
  );
}

const PALETTES = [

  ['#F8F0EA','#D9A89E','#C98B89','#B58A4F','#352323'],

];

function mix(a, b, t) {
  const pa = hex2rgb(a), pb = hex2rgb(b);
  return '#' + pa.map((c, i) => Math.round(c * (1 - t) + pb[i] * t).toString(16).padStart(2, '0')).join('');
}
function hexA(hex, a) { const [r, g, b] = hex2rgb(hex); return `rgba(${r},${g},${b},${a})`; }
function hex2rgb(hex) { const h = hex.replace('#', ''); return [0, 2, 4].map(i => parseInt(h.slice(i, i + 2), 16)); }

function App() {

    r.setProperty('--ink-mute', mix(ink, bg, 0.6));
    r.setProperty('--blush', mix(peach, bg, 0.55));
    r.setProperty('--line', hexA(ink, 0.10));

  useEffect(() => {

<script>
  (function(){
    const topbar  = document.getElementById('topbar');
    const drawer  = document.getElementById('drawer');
    const scrim   = document.getElementById('scrim');
    const menuBtn = document.getElementById('menuBtn');
    const closeBtn = document.getElementById('drawerClose');
    const nav     = document.getElementById('drawerNav');

    const openDrawer = () => {
      drawer.classList.add('open');
      scrim.classList.add('open');
      menuBtn.setAttribute('aria-expanded','true');
      drawer.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
    };
    const closeDrawer = () => {
      drawer.classList.remove('open');
      scrim.classList.remove('open');
      menuBtn.setAttribute('aria-expanded','false');
      drawer.setAttribute('aria-hidden','true');
      document.body.style.overflow='';
    };
    menuBtn.addEventListener('click', openDrawer);
    closeBtn.addEventListener('click', closeDrawer);
    scrim.addEventListener('click', closeDrawer);
    nav.addEventListener('click', e => {
      const link = e.target.closest('a');
      if (!link) return;
      e.preventDefault();
      const href = link.getAttribute('href');
      closeDrawer();
      requestAnimationFrame(() => {
        const target = document.querySelector(href);
        if (target) {
          const y = target.getBoundingClientRect().top + window.scrollY - 60;
          window.scrollTo({ top: y, behavior: 'smooth' });
          history.replaceState(null, '', href);
        }
      });
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
    });

    document.getElementById('siderail').addEventListener('click', e => {
      const link = e.target.closest('a');
      if (!link) return;
      e.preventDefault();
      const href = link.getAttribute('href');
      const target = document.querySelector(href);
      if (target) {
        const y = target.getBoundingClientRect().top + window.scrollY - 60;
        window.scrollTo({ top: y, behavior: 'smooth' });
        history.replaceState(null, '', href);
      }
    });

    const sectionIds = ['welcome','lunch','ceremony','reception','favourites'];
    const onScroll = () => {
      topbar.classList.toggle('scrolled', window.scrollY > 24);
      let active = sectionIds[0];
      const fromTop = window.scrollY + 160;
      for (const id of sectionIds) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= fromTop) active = id;
      }
      document.querySelectorAll('#drawerNav a, #siderail a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + active);
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    const io = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); }
      });
    }, { threshold: .12, rootMargin: '0px 0px -8% 0px' });
    const wire = () => document.querySelectorAll('.reveal, .fav').forEach(el => io.observe(el));
    setTimeout(wire, 80);
    window.__rewireReveal = wire;
  })();
</script>
